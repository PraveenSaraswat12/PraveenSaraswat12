name: Build Android APK

# Builds an installable debug APK from the web app via Capacitor.
# Run manually (Actions tab → Run workflow) or on push to main.
# The artifact "kithra-debug-apk" can be downloaded and sideloaded.
on:
  workflow_dispatch:
  push:
    branches: [main, claude/charming-faraday-9KqqX]

permissions:
  contents: read

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - name: Build web assets
        run: npm run build
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Sync web build into the Android project
        run: npx cap sync android
      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kithra-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
