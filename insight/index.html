<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kithra Insight — Where data becomes decisions</title>
<meta name="description" content="Kithra Insight — upload Excel, CSV, PDF, code or a web link. It understands your data, asks the right questions, builds connected interactive dashboards and answers anything through a grounded AI analyst." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
<style>
  html,body,#root{height:100%}
  body{background:#0c0e1c;margin:0}
  #boot{position:fixed;inset:0;display:grid;place-items:center;background:#0c0e1c;z-index:9999;transition:opacity .4s}
  #boot.gone{opacity:0;pointer-events:none}
  .boot-bars{display:flex;gap:5px;align-items:flex-end;height:38px}
  .boot-bars i{width:7px;border-radius:4px;background:linear-gradient(180deg,#7c4dff,#3a6df4);animation:bb 1.1s ease-in-out infinite}
  .boot-bars i:nth-child(2){animation-delay:.12s}.boot-bars i:nth-child(3){animation-delay:.24s}
  .boot-bars i:nth-child(4){animation-delay:.36s}.boot-bars i:nth-child(5){animation-delay:.48s}
  @keyframes bb{0%,100%{height:10px;opacity:.45}50%{height:38px;opacity:1}}
</style>
